events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name api.nestplatform.website;

    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name api.nestplatform.website;

    ssl_certificate /etc/letsencrypt/live/api.nestplatform.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nestplatform.website/privkey.pem;

    # Allow larger API uploads (file verify uploads can exceed 1MB)
    client_max_body_size 10m;

    location / {
      return 200 'NEST backend is running';
    }

    location /api/ {
      proxy_pass http://backend:5000/api/;
      proxy_http_version 1.1;
      client_max_body_size 10m;

      if ($http_origin ~* ^https://(www\.)?nestplatform\.website$) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Vary Origin always;
      }
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    }

    location /socket.io/ {
      proxy_pass http://backend:5000/socket.io/;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_read_timeout 86400;
    }
  }
}