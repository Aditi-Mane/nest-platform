events {}

http {

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name api.nestplatform.website;

    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name api.nestplatform.website;

    ssl_certificate /etc/letsencrypt/live/api.nestplatform.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nestplatform.website/privkey.pem;

    location / {
      return 200 'NEST backend is running';
    }

    location /api/ {
      proxy_pass http://backend:5000/api/;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}