events {}

http {

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name api.nestplatform.website;

    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name api.nestplatform.website;

    ssl_certificate /etc/letsencrypt/live/api.nestplatform.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nestplatform.website/privkey.pem;

    location / {
      return 200 'NEST backend is running';
    }

    location /api/ {
      proxy_pass http://backend:5000/api/;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      set $allowed_origin "";

      if ($http_origin = "https://www.nestplatform.website") {
        set $allowed_origin $http_origin;
      }

      if ($http_origin = "https://nestplatform.website") {
        set $allowed_origin $http_origin;
      }

      add_header Access-Control-Allow-Origin $allowed_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    if ($request_method = OPTIONS) {
      set $allowed_origin "";

      if ($http_origin = "https://www.nestplatform.website") {
        set $allowed_origin $http_origin;
      }

      if ($http_origin = "https://nestplatform.website") {
        set $allowed_origin $http_origin;
      }

      add_header Access-Control-Allow-Origin $allowed_origin;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type";
      return 204;
    }
  }
}